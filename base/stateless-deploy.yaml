apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateless-nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stateless-nginx
  template:
    metadata:
      labels:
        app: stateless-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: stateless-nginx-svc
spec:
  selector:
    app: stateless-nginx
  ports:
  - port: 80
    targetPort: 80