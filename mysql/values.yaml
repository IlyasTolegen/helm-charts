replicaCount: 3
image:
  repository: mysql
  tag: "8.0"
  pullPolicy: IfNotPresent
mysql:
  rootPassword: "rootpassword"
service:
  port: 3306
storage:
  size: 1Gi
  storageClass: "csi-hostpath"
networkPolicy:
  enabled: true
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi