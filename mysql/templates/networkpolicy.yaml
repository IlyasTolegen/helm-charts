{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mysql.fullname" . }}-np
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mysql.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
      port: {{ .Values.service.port | default 3306 }}
      protocol: TCP
  egress:
  - to:
    - namespaceSelector: {}
{{- end }}