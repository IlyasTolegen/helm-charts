{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "echoDaemon.fullname" . }}-np
  labels:
    {{- include "echoDaemon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "echoDaemon.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
{{- end }}