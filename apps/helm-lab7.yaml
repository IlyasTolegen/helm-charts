apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-lab7
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ilyastolegen/helm-charts.git
    targetRevision: main
    path: lab7
    helm:
      values: |
        mysql:
          storage:
            storageClass: csi-hostpath-sc
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 3Gi
        nginx:
          ingress:
            enabled: true
            host: nginx.lab7.local
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
